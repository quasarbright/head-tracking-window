<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Head Tracking Window</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #111; color: #eee; font-family: monospace; height: 100vh; display: flex; align-items: center; justify-content: center; }

    #qr-view { display: flex; flex-direction: column; align-items: center; gap: 16px; position: relative; z-index: 10; }
    #qr-view p { margin: 0; font-size: 14px; color: #aaa; }

    #scene-view { display: none; position: fixed; inset: 0; }
    #scene-view.active { display: block; }

    .marker-canvas { image-rendering: pixelated; padding: 20px; background: white; position: fixed; z-index: 10; visibility: hidden; }
    .marker-canvas.tl { top: 0; left: 0; }
    .marker-canvas.tr { top: 0; right: 0; }
    .marker-canvas.bl { bottom: 0; left: 0; }
    .marker-canvas.br { bottom: 0; right: 0; }
    .marker-canvas.tm { top: 0; left: 50%; transform: translateX(-50%); }
    .marker-canvas.bm { bottom: 0; left: 50%; transform: translateX(-50%); }

    #debug { position: fixed; bottom: 40px; left: 0; right: 0; text-align: center; font-size: 13px; color: #aaa; z-index: 10; pointer-events: none; }
    #conn-status { font-size: 13px; color: #888; }
    #version { position: fixed; bottom: 8px; right: 12px; font-size: 11px; color: #444; font-family: monospace; z-index: 10; }
    #copy-btn { margin-top: 4px; padding: 6px 14px; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; font-family: monospace; cursor: pointer; }
    #copy-btn:hover { background: #444; }
    #copy-btn.copied { color: #4f4; border-color: #4f4; }
  </style>
</head>
<body>

  <div id="qr-view">
    <p>Scan with phone to connect</p>
    <div id="qr"></div>
    <button id="copy-btn" style="display:none">Copy link</button>
    <div id="conn-status">Waiting for connection…</div>
  </div>

  <div id="scene-view">
    <canvas id="marker-tl" class="marker-canvas tl"></canvas>
    <canvas id="marker-tr" class="marker-canvas tr"></canvas>
    <canvas id="marker-bl" class="marker-canvas bl"></canvas>
    <canvas id="marker-br" class="marker-canvas br"></canvas>
    <canvas id="marker-tm" class="marker-canvas tm"></canvas>
    <canvas id="marker-bm" class="marker-canvas bm"></canvas>
    <div id="debug"></div>
  </div>

  <div id="version">flip-z</div>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="js/aruco.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/peer-host.js"></script>
  <script>
    const sceneResult = initScene(document.getElementById('scene-view'));
    const head = { x: 0, y: 0, z: 6 };

    if (sceneResult) {
      const { renderer, camera, scene } = sceneResult;

      function render() {
        updateCamera(camera, head, window.innerWidth, window.innerHeight, MARKER_PX);
        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }
      render();
    }

    // Generate markers via OpenCV (done in background; markers shown once phone connects)
    loadOpenCV(() => {
      try {
        const dict = cv.getPredefinedDictionary(cv.aruco_DICT_4X4_50 !== undefined ? cv.aruco_DICT_4X4_50 : 0);
        const markers = [
          { id: 0, canvasId: 'marker-tl' },
          { id: 1, canvasId: 'marker-tr' },
          { id: 2, canvasId: 'marker-bl' },
          { id: 3, canvasId: 'marker-br' },
          { id: 4, canvasId: 'marker-tm' },
          { id: 5, canvasId: 'marker-bm' },
        ];
        for (const { id, canvasId } of markers) {
          const mat = new cv.Mat();
          cv.generateImageMarker(dict, id, 150, mat, 1);
          cv.imshow(canvasId, mat);
          mat.delete();
        }
      } catch(e) {
        console.warn('OpenCV marker generation failed:', e.message);
      }
    }, msg => console.log('PC OpenCV:', msg));
  </script>
</body>
</html>

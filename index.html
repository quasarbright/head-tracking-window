<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Head Tracking Window</title>
  <style>
    body { margin: 0; background: #111; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #qr-container { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #qr-container p { margin: 0; font-size: 14px; color: #aaa; }
    #log { margin-top: 24px; padding: 12px; background: #222; border-radius: 6px; min-width: 300px; min-height: 60px; font-size: 13px; white-space: pre-wrap; }
    #status { font-size: 13px; color: #aaa; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="qr-container">
    <p>Scan with phone to connect</p>
    <div id="qr"></div>
    <div id="status">Waiting for connection…</div>
  </div>
  <pre id="log"></pre>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/peer-host.js"></script>
</body>
</html>

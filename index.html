<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Head Tracking Window</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #111; color: #eee; font-family: monospace; height: 100vh; display: flex; align-items: center; justify-content: center; }

    #qr-view { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #qr-view p { margin: 0; font-size: 14px; color: #aaa; }

    #marker-view { display: none; flex-direction: column; align-items: center; gap: 24px; }
    #marker-view.active { display: flex; }

    #marker-canvas { image-rendering: pixelated; padding: 40px; background: white; }
    #debug { font-size: 13px; color: #aaa; text-align: center; }
    #conn-status { font-size: 13px; color: #888; }
    #version { position: fixed; bottom: 8px; right: 12px; font-size: 11px; color: #444; font-family: monospace; }
    #copy-btn { margin-top: 4px; padding: 6px 14px; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; font-family: monospace; cursor: pointer; }
    #copy-btn:hover { background: #444; }
    #copy-btn.copied { color: #4f4; border-color: #4f4; }
  </style>
</head>
<body>

  <div id="qr-view">
    <p>Scan with phone to connect</p>
    <div id="qr"></div>
    <button id="copy-btn" style="display:none">Copy link</button>
    <div id="conn-status">Waiting for connection…</div>
  </div>

  <div id="marker-view">
    <canvas id="marker-canvas"></canvas>
    <div id="debug">Waiting for detections…</div>
    <div id="conn-status2">Connected</div>
  </div>

  <div id="version">fix-deleted-mat</div>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/aruco.js"></script>
  <script src="js/peer-host.js"></script>
  <script>
    // Generate marker via OpenCV once it loads, replacing the hardcoded canvas
    loadOpenCV(() => {
      try {
        const markerMat = new cv.Mat();
        const dict = cv.getPredefinedDictionary(cv.aruco_DICT_4X4_50 !== undefined ? cv.aruco_DICT_4X4_50 : 0);
        cv.aruco_generateImageMarker(dict, 0, 300, markerMat, 1);
        cv.imshow('marker-canvas', markerMat);
        markerMat.delete();
        console.log('Marker generated via OpenCV');
      } catch(e) {
        console.warn('OpenCV marker generation failed, using hardcoded fallback:', e.message);
      }
    }, msg => console.log('PC OpenCV:', msg));
  </script>
</body>
</html>

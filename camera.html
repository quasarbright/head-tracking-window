<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Head Tracker — Phone</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #status { position: fixed; bottom: 24px; left: 0; right: 0; text-align: center; color: #fff; font-family: monospace; font-size: 14px; text-shadow: 0 1px 4px #000; }
    #version { position: fixed; bottom: 8px; right: 12px; font-size: 11px; color: rgba(255,255,255,0.3); font-family: monospace; }
    #log { position: fixed; bottom: 44px; left: 0; right: 0; text-align: center; color: #aaa; font-family: monospace; font-size: 13px; text-shadow: 0 1px 4px #000; }
    #debug-overlay { position: fixed; top: 12px; left: 12px; right: 12px; color: #ff0; font-family: monospace; font-size: 12px; text-shadow: 0 1px 3px #000; pointer-events: none; white-space: pre-wrap; }
    #preview { position: fixed; bottom: 60px; right: 12px; width: 160px; height: 90px; border: 1px solid #ff0; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <canvas id="preview"></canvas>
  <div id="version">no-grayscale-persist-outline</div>
  <div id="debug-overlay"></div>
  <div id="log"></div>
  <div id="status">Starting camera…</div>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="js/aruco.js"></script>
  <script src="js/peer-client.js"></script>
</body>
</html>
